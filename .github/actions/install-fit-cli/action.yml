name: Install fit-cli
description: >
  Installs the fit-cli binary onto PATH. Normally installs a released channel
  (latest/ci). If `ref` is set, instead builds fit-cli from that branch/tag/PR
  ref of couchbaselabs/fit-cli from source, so a fit-cli change can be tested
  here before it's released.

inputs:
  channel:
    description: fit-cli install channel ("latest" or "ci"). Ignored if `ref` is set.
    required: false
    default: ci
  ref:
    description: >
      Optional couchbaselabs/fit-cli git ref to build from source instead of
      installing a release (e.g. a branch name, or `refs/pull/123/head` for a PR).
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install release channel
      if: inputs.ref == ''
      shell: bash
      run: curl -fsSL https://raw.githubusercontent.com/couchbaselabs/fit-cli/main/install.sh | CHANNEL="${{ inputs.channel }}" bash

    - name: Checkout fit-cli@${{ inputs.ref }}
      if: inputs.ref != ''
      uses: actions/checkout@v4
      with:
        repository: couchbaselabs/fit-cli
        ref: ${{ inputs.ref }}
        path: .fit-cli-src

    - name: Build fit-cli from source
      if: inputs.ref != ''
      shell: bash
      working-directory: .fit-cli-src
      run: |
        curl -fsSL https://bun.sh/install | bash
        echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.bun/bin:$PATH"

        bun install --frozen-lockfile
        mkdir -p "$HOME/.local/bin"
        bun build --compile --target=bun-linux-x64 src/fit/main/main.ts --outfile "$HOME/.local/bin/fit"
        chmod +x "$HOME/.local/bin/fit"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/fit" version
