name: Run FIT Testing (Java Columnar)

on:
  schedule:
    # Each day at midnight (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      fit_cli_preset:
        description: FIT preset to run.
        required: false
        type: string
        default: capella-analytics-qe-set
      fit_cli_collect_extra_diagnostics:
        description: Collect additional diagnostics (includes cbcollect, is slower)
        required: false
        type: boolean
        default: true
      fit_cli_channel:
        description: fit-cli install channel ("latest" or "ci").
        required: false
        type: string
        default: ci
  workflow_call:
    inputs:
      fit_cli_collect_extra_diagnostics:
        description: Collect additional diagnostics (includes cbcollect, is slower)
        required: false
        type: boolean
        default: true
      fit_cli_channel:
        description: fit-cli install channel ("latest" or "ci").
        required: false
        type: string
        default: ci

jobs:
  run-fit-java:
    uses: ./.github/workflows/fit-testing-shared.yml
    with:
      preset: ${{ vars.FIT_CLI_PRESET || inputs.fit_cli_preset }}
      collect_extra_diagnostics: ${{ inputs.fit_cli_collect_extra_diagnostics }}
      performer_image_name: 'columnar-java-fit-performer:main'
      fit_cli_channel: ${{ vars.FIT_CLI_CHANNEL || inputs.fit_cli_channel }}
