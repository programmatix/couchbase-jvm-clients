name: Run FIT Testing (Java Columnar)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      preset:
        description: FIT preset to run.
        required: false
        type: string
        default: capella-analytics-qe-set
      collect_extra_diagnostics:
        description: Collect additional diagnostics (includes cbcollect, is slower)
        required: false
        type: boolean
        default: true
      channel:
        description: fit-cli install channel ("latest" or "ci").
        required: false
        type: string
        default: ci
      fit_cli_ref:
        description: >
          Optional couchbaselabs/fit-cli git ref (branch, tag, or `refs/pull/<n>/head`)
          to build fit-cli from source instead of installing `channel`. For testing a
          fit-cli branch or PR.
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      collect_extra_diagnostics:
        description: Collect additional diagnostics (includes cbcollect, is slower)
        required: false
        type: boolean
        default: true
      channel:
        description: fit-cli install channel ("latest" or "ci").
        required: false
        type: string
        default: ci
      fit_cli_ref:
        description: >
          Optional couchbaselabs/fit-cli git ref (branch, tag, or `refs/pull/<n>/head`)
          to build fit-cli from source instead of installing `channel`. For testing a
          fit-cli branch or PR.
        required: false
        type: string
        default: ''

jobs:
  run-fit-java:
    uses: ./.github/workflows/fit-testing-shared.yml
    with:
      preset: ${{ vars.FIT_CLI_PRESET || inputs.preset }}
      collect_extra_diagnostics: ${{ inputs.collect_extra_diagnostics }}
      performer: 'columnar-java-fit-performer:main'
      channel: ${{ vars.FIT_CLI_CHANNEL || inputs.channel }}
      fit_cli_ref: ${{ inputs.fit_cli_ref }}
