name: Run FIT Testing (Java Columnar)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      preset:
        description: FIT presets or preset groups to run, comma-separated. (`fit preset list`)
        required: false
        type: string
        default: columnar-multi-lite
      collect_extra_diagnostics:
        description: Collect additional diagnostics (includes cbcollect, is slower)
        required: false
        type: boolean
        default: true
      channel:
        description: fit-cli install channel ("latest" or "ci").
        required: false
        type: string
        default: ci
  workflow_call:
    inputs:
      collect_extra_diagnostics:
        description: Collect additional diagnostics (includes cbcollect, is slower)
        required: false
        type: boolean
        default: true
      channel:
        description: fit-cli install channel ("latest" or "ci").
        required: false
        type: string
        default: ci

jobs:
  run-fit-java:
    # TEST: call the fit-cli reusable workflow directly (cross-repo) instead of the local
    # fit-testing-shared.yml. This gains JUnit publishing + artifact upload + SHA-pinned actions
    # and removes the per-repo duplication. Pinned to the test branch until the fit-cli change
    # merges to main; then switch the ref to @main.
    uses: couchbaselabs/fit-cli/.github/workflows/fit-cli.yaml@gp-fit-cli-preset-support
    with:
      preset: ${{ vars.FIT_CLI_PRESET || inputs.preset || 'columnar-multi-lite' }}
      # Guard the empty-string-on-schedule case (mirrors fit-testing-java.yml): passing '' to a
      # boolean reusable-workflow input is a config-time error.
      cbcollect: ${{ inputs.collect_extra_diagnostics == '' && true || inputs.collect_extra_diagnostics }}
      performer: 'columnar-java-fit-performer:main'
      fitCliSource: ${{ vars.FIT_CLI_CHANNEL || inputs.channel }}
    secrets: inherit
